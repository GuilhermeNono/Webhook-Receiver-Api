services:
  webhook-api:
    image: guilhermenono/wra:latest
    container_name: webhook-api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "${API_PORT:-8080}"
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    volumes:
      - ./data:/app/data

  ngrok:
    image: ngrok/ngrok:latest
    container_name: webhook-api-ngrok
    restart: unless-stopped
    depends_on:
      - webhook-api
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "webhook-api:${API_PORT:-8080}"
    ports:
      - "4040:4040"
